<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .emoji img {
            width: 150px; /* larger image */
            height: auto; /* keep aspect ratio */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">
            <img src="assets/icon.png" alt="Maintenance">
        </div>
        <h1>503</h1>
        <h2>Service Unavailable</h2>
        <p>Sorry, my website is currently down for maintenance. I'm working hard to improve it and will be back online shortly.</p>
    </div>
</body>
</html>
